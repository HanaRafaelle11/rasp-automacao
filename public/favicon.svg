<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- White background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  
  <!-- Red R letter - bold, italic style matching logo -->
  <!-- Vertical stroke of R -->
  <rect x="100" y="80" width="60" height="320" rx="8" fill="#CC2200"/>
  <!-- Top bowl of R -->
  <path d="M100 80 H260 Q360 80 360 175 Q360 265 260 265 H100 Z" fill="#CC2200"/>
  <!-- Inner cutout of bowl -->
  <path d="M160 130 H245 Q300 130 300 175 Q300 215 245 215 H160 Z" fill="#ffffff"/>
  <!-- Leg of R -->
